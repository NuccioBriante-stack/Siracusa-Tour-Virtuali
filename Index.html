<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Tour Siracusa - Versione Corretta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css"/>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; background-color: #000; }
        body { margin: 0; }

        /* Rimuove i messaggi di caricamento */
        .pnlm-load-box, .pnlm-lbox, .pnlm-loading-dots { display: none !important; }

        /* Hotspot Navigazione (Street View) */
        .pnlm-hotspot-base.pnlm-scene {
            background: none !important;
            border: none !important;
            width: 50px !important;
            height: 50px !important;
            margin-left: -25px !important;
            margin-top: -25px !important;
        }

        .pnlm-hotspot-base.pnlm-scene::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) perspective(100px) rotateX(65deg);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 45px solid rgba(255, 255, 255, 0.7);
        }

        /* Hotspot Informativi (Cerchio Blu) */
        .pnlm-hotspot-base.pnlm-info {
            background-color: rgba(0, 120, 215, 0.8) !important;
            border: 2px solid white !important;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
// 1. I TUOI DATI
// 1. AGGIORNA QUI IL TUO ELENCO
const tourData = [
    { file: "Siracusa_foto_001.jpg", info: [{ pitch: 5, yaw: 10, testo: "Info 1" }] },
    { file: "Siracusa_foto_002.jpg", info: [] },
    { file: "Siracusa_foto_003.jpg", info: [{ pitch: 0, yaw: -20, testo: "Info 2" }] },
    { file: "Siracusa_foto_004.jpg", info: [] }, // Ora la 3 vedrà la 4 e creerà la freccia!
    { file: "Siracusa_foto_005.jpg", info: [] },
    { file: "Siracusa_foto_006.jpg", info: [] },
    { file: "Siracusa_foto_007.jpg", info: [] },
    { file: "Siracusa_foto_008.jpg", info: [] }
];

// 2. GENERATORE DI SCENE
function generaScene(dati) {
    let scenes = {};
    dati.forEach((item, index) => {
        let idAttuale = "scena" + index;
        let hotSpots = [];

        if (index < dati.length - 1) {
            hotSpots.push({
                "pitch": -25, "yaw": 0, "type": "scene", "sceneId": "scena" + (index + 1),
                "clickHandlerFunc": simulateStreetView,
                "clickHandlerArgs": { "sceneId": "scena" + (index + 1), "yaw": 0, "pitch": -25 }
            });
        }
        if (index > 0) {
            hotSpots.push({
                "pitch": -25, "yaw": 180, "type": "scene", "sceneId": "scena" + (index - 1),
                "clickHandlerFunc": simulateStreetView,
                "clickHandlerArgs": { "sceneId": "scena" + (index - 1), "yaw": 180, "pitch": -25 }
            });
        }
        if (item.info) {
            item.info.forEach(punto => {
                hotSpots.push({ "pitch": punto.pitch, "yaw": punto.yaw, "type": "info", "text": punto.testo });
            });
        }

        scenes[idAttuale] = { "panorama": item.file, "hotSpots": hotSpots };
    });
    return scenes;
}

function simulateStreetView(event, handlerArgs) {
    viewer.setYaw(handlerArgs.yaw, 300);
    viewer.setPitch(handlerArgs.pitch, 300);
    viewer.setHfov(40, 300);
    setTimeout(function() {
        viewer.loadScene(handlerArgs.sceneId);
        viewer.setHfov(100, 0); 
    }, 350);
}

// 3. AVVIO

var viewer = pannellum.viewer('panorama', {
    "default": {
        "firstScene": "scena0",
        "sceneFadeDuration": 800,
        "autoLoad": true,
        "showControls": true, // Importante: sul Quest ti servono i comandi visibili
        "orientationOnByDefault": true // Attiva il giroscopio (muovi la testa per guardarti intorno)
    },
    "scenes": generaScene(tourData)
});

</script>
</body>
</html>
